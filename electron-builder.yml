appId: com.chennaimetco.vickersmeasurementsoftware
productName: Vickers Measurement Software
copyright: Copyright (c) Chennai Metco
directories:
  output: release
  buildResources: build
asar: true
# Use a locally-extracted Electron runtime so the build works offline.
# The folder is created by scripts/prepare-electron-dist.js (run automatically
# from `dist`/`dist:win`) by extracting the matching Electron zip from the
# @electron/get cache used by Forge / electron download.
electronDist: .electron-dist/win-x64-33.4.11
# Native modules are rebuilt explicitly via `npm run rebuild:native`
# (which drives electron-rebuild + custom node-gyp builds). Don't let
# electron-builder run its own rebuild pass — it doesn't know about the
# custom addons under backend/native and native/.
npmRebuild: false
nodeGypRebuild: false
asarUnpack:
  - "backend/native/**/*.node"
  - "native/serial-addon/**/*.node"
  - "backend/node_modules/serialport/**"
  - "backend/node_modules/@serialport/**"
  - "backend/node_modules/better-sqlite3/**"
  - "backend/node_modules/bindings/**"
  - "backend/node_modules/node-gyp-build/**"
files:
  - "package.json"
  - "electron/**/*"
  - "backend/dist/**/*"
  - "backend/package.json"
  - "backend/node_modules/**/*"
  - "frontend/dist/**/*"
  - "!backend/src/**"
  - "!backend/native/hardness-addon/src/**"
  - "!backend/native/hardness-addon/include/**"
  - "!backend/native/hardness-addon/build/obj/**"
  - "!backend/native/hardness-addon/build/Release/*.{iobj,ipdb,pdb,exp,lib}"
  - "!backend/native/hardness-addon/binding.gyp"
  - "!backend/native/hardness-addon/node_modules/**"
  - "!native/serial-addon/build/obj/**"
  - "!native/serial-addon/build/Release/*.{iobj,ipdb,pdb,exp,lib}"
  - "!native/serial-addon/src/**"
  - "!native/serial-addon/binding.gyp"
  - "!**/*.{md,markdown}"
  - "!**/{.eslintrc*,.prettierrc*,tsconfig*.json}"
extraResources:
  - from: ".env.prod"
    to: ".env.prod"
  - from: "backend/.env.prod"
    to: "backend/.env.prod"
  - from: "frontend/.env.prod"
    to: "frontend/.env.prod"
  # Mirrors forge `extraResource: backend/native` -> resourcesPath/native
  # cameraService.js reads from process.resourcesPath/native/hardness-addon/...
  - from: "backend/native"
    to: "native"
    filter: ["**/*", "!**/src/**", "!**/include/**", "!**/build/obj/**", "!**/build/Release/*.{iobj,ipdb,pdb,exp,lib}", "!**/node_modules/**", "!**/binding.gyp"]
  - from: "native/serial-addon"
    to: "serial-addon"
    filter: ["**/build/Release/*.node", "package.json"]
  # OpenCV runtime DLLs. Drop opencv_world4100.dll (and friends) into vendor/opencv/bin.
  # Matches the packaged candidate path in electron/cameraService.js
  #   process.resourcesPath/native/hardness-addon/opencv/bin
  - from: "vendor/opencv/bin"
    to: "native/hardness-addon/opencv/bin"
    filter: ["**/*.dll"]
  # Do3Think / HikRobot DVP2 camera SDK DLLs (DVPCamera64.dll + dependencies).
  # Drop them into vendor/camera-sdk; electron/cameraService.js adds this path
  # to the SDK search list in packaged mode.
  - from: "vendor/camera-sdk"
    to: "camera-sdk"
    filter: ["**/*.dll"]
win:
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  shortcutName: Vickers Measurement Software
  artifactName: "Vickers Measurement Software Setup ${version}.exe"
portable:
  artifactName: "Vickers Measurement Software Portable ${version}.exe"
